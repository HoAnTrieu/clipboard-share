<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MyClipboard</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyClipboard">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>MyClipboard</h1>
      <p id="login-subtitle" class="login-subtitle">shared clipboard</p>
      <div id="login-error" class="login-error hidden"></div>
      <form id="login-form" autocomplete="off">
        <label class="login-label">
          <span id="login-username-label">Username</span>
          <input id="login-username" type="text" autocomplete="username" required>
        </label>
        <label class="login-label">
          <span id="login-password-label">Password</span>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </label>
        <button id="login-btn" class="btn btn-primary btn-full" type="submit">Login</button>
      </form>
      <div id="theme-toggle-login" class="theme-toggle-login">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </div>
  </div>

  <!-- Main app (hidden until logged in) -->
  <div id="app" class="hidden">
    <header>
      <div class="header-left">
        <h1>MyClipboard</h1>
        <span class="subtitle">shared clipboard</span>
      </div>
      <div class="header-right">
        <button id="admin-btn" class="admin-btn hidden" aria-label="Admin panel">&#9881;</button>
        <button id="theme-toggle-main" class="theme-toggle" aria-label="Toggle theme"></button>
        <div id="status" class="status offline"></div>
        <button id="logout-btn" class="logout-btn" aria-label="Logout">&#8594;</button>
      </div>
    </header>

    <nav id="tabs"></nav>

    <main>
      <div class="paste-area">
        <textarea id="text-input" placeholder="Type or paste text here..." rows="3"></textarea>
        <div class="paste-actions">
          <span class="hint">Ctrl+Enter = send &nbsp;|&nbsp; Ctrl+V = paste image</span>
          <div class="paste-buttons">
            <button id="file-btn" class="btn btn-secondary">Attach file</button>
            <input id="file-input" type="file" multiple hidden>
            <button id="send-btn" class="btn btn-primary">Send</button>
          </div>
        </div>
      </div>

      <div id="uploading"></div>
      <div id="clips"></div>
    </main>

    <div id="drop-overlay" class="drop-overlay">
      <div class="drop-overlay-content">
        <div class="drop-icon">&#128206;</div>
        <p>Drop image here</p>
      </div>
    </div>

    <div id="new-board-modal" class="modal-overlay">
      <div class="modal">
        <h2 id="modal-title">New tab</h2>
        <label class="modal-label">
          <span id="modal-name-label">Name</span>
          <input id="modal-name" type="text" autocomplete="off">
        </label>
        <label class="modal-label">
          <span id="modal-expires-label">Expires after</span>
          <select id="modal-expires">
            <option value="">Never</option>
            <option value="3600000">1h</option>
            <option value="86400000">24h</option>
            <option value="604800000">7d</option>
            <option value="2592000000">30d</option>
          </select>
        </label>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-create" class="btn btn-primary">Create</button>
        </div>
      </div>
    </div>

    <div id="unlock-modal" class="modal-overlay">
      <div class="modal">
        <h2 id="unlock-title">Unlock tab</h2>
        <p id="unlock-prompt" class="unlock-prompt"></p>
        <label class="modal-label">
          <input id="unlock-input" type="text" autocomplete="off">
        </label>
        <div class="modal-actions">
          <button id="unlock-cancel" class="btn btn-secondary">Cancel</button>
          <button id="unlock-confirm" class="btn btn-primary" disabled>Unlock</button>
        </div>
      </div>
    </div>

    <!-- Admin panel modal -->
    <div id="admin-modal" class="modal-overlay admin-modal-overlay">
      <div class="modal admin-modal">
        <div class="admin-modal-header">
          <h2 id="admin-title">Admin Panel</h2>
          <button id="admin-close" class="admin-close-btn" aria-label="Close">&times;</button>
        </div>

        <!-- Tabs within admin -->
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="users">Users</button>
          <button class="admin-tab" data-tab="settings">Settings</button>
        </div>

        <!-- Users tab -->
        <div id="admin-users-tab" class="admin-tab-content active">
          <div class="admin-users-header">
            <h3 id="users-list-title">Users</h3>
            <button id="add-user-btn" class="btn btn-primary btn-sm">+ Add User</button>
          </div>
          <div id="users-list"></div>
        </div>

        <!-- Settings tab -->
        <div id="admin-settings-tab" class="admin-tab-content">
          <div class="admin-section">
            <h3 id="danger-zone-title">Danger Zone</h3>
            <div class="danger-zone">
              <p id="reset-db-desc">Reset database: delete all boards, clips, and uploaded files.</p>
              <button id="reset-db-btn" class="btn btn-danger">Reset Database</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add/Edit user modal -->
    <div id="user-modal" class="modal-overlay">
      <div class="modal">
        <h2 id="user-modal-title">Add User</h2>
        <input id="user-modal-id" type="hidden">
        <label class="modal-label">
          <span id="user-modal-username-label">Username</span>
          <input id="user-modal-username" type="text" autocomplete="off">
        </label>
        <label class="modal-label">
          <span id="user-modal-password-label">Password</span>
          <input id="user-modal-password" type="password" autocomplete="new-password">
        </label>
        <label class="modal-label">
          <span id="user-modal-role-label">Role</span>
          <select id="user-modal-role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </label>
        <div class="modal-actions">
          <button id="user-modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="user-modal-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
